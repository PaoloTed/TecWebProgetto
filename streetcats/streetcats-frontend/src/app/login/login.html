<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-[420px]">

    <!-- Logo + heading -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl text-2xl mb-5 mx-auto" style="background: linear-gradient(135deg, #f97316, #7c5cf6);">🐱</div>
      <h1 class="text-2xl font-bold text-white mb-1">Bentornato su StreetCats</h1>
      <p class="text-sm" style="color: var(--c-muted);">Inserisci le tue credenziali per continuare</p>
    </div>

    <!-- Card -->
    <div class="card p-8" style="background: rgba(255,255,255,0.03);">

      <!-- Error alert -->
      @if (errorMessage) {
        <div class="alert alert-error mb-6">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" flex-shrink="0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

        <!-- Email -->
        <div class="flex flex-col gap-1.5">
          <label for="email" class="section-label">Indirizzo email</label>
          <input id="email" type="email" formControlName="email" class="input"
                 placeholder="mario@example.com" autocomplete="email">
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-1.5">
          <label for="password" class="section-label">Password</label>
          <input id="password" type="password" formControlName="password" class="input"
                 placeholder="••••••••" autocomplete="current-password">
        </div>

        <!-- Divider -->
        <hr class="divider my-1">

        <!-- Submit -->
        <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary btn-lg w-full">
          @if (isLoading) {
            <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            Accesso in corso…
          } @else {
            Accedi all'account
          }
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-sm mt-6" style="color: var(--c-subtle);">
      Non hai un account?&nbsp;
      <a href="#" class="font-medium" style="color: var(--c-primary);">Registrati gratuitamente</a>
    </p>

  </div>
</div>
